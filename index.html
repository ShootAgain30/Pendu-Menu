<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<script src="codes.js"></script>
<meta name="theme-color" content="#0f0c1a">
<title>Le Pendu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.signature{text-align:right;font-size:3vw;color:#444;font-style:italic;margin-top:2vw;padding-right:1vw}
:root {
  --bg: #0f0c1a;
  --accent: #e8ff47;
  --accent2: #ff4757;
  --accent3: #48dbfb;
  --text: #f0ebff;
  --muted: rgba(240,235,255,0.35);
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Serif Display',serif; overflow:hidden; touch-action:manipulation; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 80% 60% at 10% 0%,rgba(232,255,71,0.06) 0%,transparent 60%),
              radial-gradient(ellipse 60% 80% at 90% 100%,rgba(72,219,251,0.05) 0%,transparent 60%); }

/* ── ECRAN CODE ── */
#code-screen { position:fixed; inset:0; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; background:var(--bg); }
#code-screen.hidden { display:none; }
.code-logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(3rem,15vw,4.5rem); letter-spacing:0.18em; color:var(--accent); text-shadow:0 0 60px rgba(232,255,71,0.35); line-height:1; text-align:center; margin-bottom:8px; }
.code-subtitle { font-family:'DM Mono',monospace; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:40px; text-align:center; }
.code-input-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; width:100%; max-width:280px; }
.code-input { background:var(--card); border:2px solid var(--border); color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.4em; text-align:center; width:100%; padding:16px 20px; border-radius:8px; outline:none; transition:border-color 0.2s; }
.code-input:focus { border-color:var(--accent); }
.code-input.error { border-color:var(--accent2); animation:shake 0.4s ease; }
.code-error { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--accent2); letter-spacing:0.1em; min-height:20px; text-align:center; }
.code-submit { background:var(--accent); color:var(--bg); border:none; padding:14px 50px; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.2em; cursor:pointer; border-radius:6px; transition:all 0.2s; box-shadow:0 0 30px rgba(232,255,71,0.3); width:100%; }
.code-submit:active { transform:scale(0.97); }

/* ── MENU ── */
#menu-screen { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; background:var(--bg); transition:opacity 0.5s,transform 0.5s; }
#menu-screen.hidden { opacity:0; pointer-events:none; transform:scale(0.96); }
.menu-bg { position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 70% 50% at 50% 20%,rgba(232,255,71,0.07) 0%,transparent 60%),
              radial-gradient(ellipse 50% 60% at 80% 80%,rgba(72,219,251,0.06) 0%,transparent 60%); }
.highscore-bar { position:relative; z-index:1; width:100%; text-align:right; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.highscore-bar span { color:var(--accent); font-size:0.85rem; font-family:'Bebas Neue',sans-serif; letter-spacing:0.1em; }
.menu-logo { font-family:'Bebas Neue',sans-serif; font-size:clamp(3.5rem,18vw,5.5rem); letter-spacing:0.18em; color:var(--accent); text-shadow:0 0 60px rgba(232,255,71,0.35),0 0 120px rgba(232,255,71,0.15); line-height:1; text-align:center; animation:menuPulse 4s ease-in-out infinite; position:relative; z-index:1; }
@keyframes menuPulse { 0%,100%{text-shadow:0 0 60px rgba(232,255,71,0.35),0 0 120px rgba(232,255,71,0.15)} 50%{text-shadow:0 0 80px rgba(232,255,71,0.6),0 0 160px rgba(232,255,71,0.25)} }
.menu-gallows { margin:12px 0; position:relative; z-index:1; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.menu-section-title { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; margin-top:20px; position:relative; z-index:1; }
.diff-group { display:flex; gap:10px; position:relative; z-index:1; }
.diff-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.12em; padding:10px 18px; border-radius:6px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; min-width:80px; text-align:center; }
.diff-btn::after { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.15s; }
.diff-btn:active::after { opacity:0.15; }
.diff-btn.active-easy   { background:rgba(72,219,251,0.12); border-color:var(--accent3); color:var(--accent3); box-shadow:0 0 20px rgba(72,219,251,0.2); }
.diff-btn.active-normal { background:rgba(232,255,71,0.12); border-color:var(--accent);  color:var(--accent);  box-shadow:0 0 20px rgba(232,255,71,0.2); }
.diff-btn.active-hard   { background:rgba(255,71,87,0.12);  border-color:var(--accent2); color:var(--accent2); box-shadow:0 0 20px rgba(255,71,87,0.2); }
.toggle-row { display:flex; align-items:center; gap:14px; position:relative; z-index:1; background:var(--card); border:1px solid var(--border); padding:12px 20px; border-radius:8px; cursor:pointer; transition:all 0.2s; width:100%; max-width:300px; justify-content:space-between; }
.toggle-row:active { transform:scale(0.98); }
.toggle-label { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text); }
.toggle-switch { width:42px; height:24px; border-radius:12px; background:rgba(255,255,255,0.1); border:1px solid var(--border); position:relative; transition:all 0.3s; flex-shrink:0; }
.toggle-switch::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:var(--muted); top:2px; left:2px; transition:all 0.3s; }
.toggle-switch.on { background:rgba(232,255,71,0.2); border-color:var(--accent); }
.toggle-switch.on::after { background:var(--accent); left:20px; box-shadow:0 0 8px rgba(232,255,71,0.5); }
.play-btn { background:var(--accent); color:var(--bg); border:none; padding:16px 60px; font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.2em; cursor:pointer; border-radius:6px; transition:all 0.25s; box-shadow:0 0 40px rgba(232,255,71,0.35); position:relative; z-index:1; margin-top:28px; animation:playPulse 2.5s ease-in-out infinite; }
@keyframes playPulse { 0%,100%{box-shadow:0 0 40px rgba(232,255,71,0.35)} 50%{box-shadow:0 0 70px rgba(232,255,71,0.6)} }
.play-btn:active { transform:scale(0.96); }
.menu-sound-btn { background:rgba(232,255,71,0.08); border:1px solid rgba(232,255,71,0.35); color:#e8ff47; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.1em; padding:7px 20px; border-radius:100px; cursor:pointer; transition:all 0.2s; margin-top:10px; position:relative; z-index:1; }
.menu-sound-btn:active { transform:scale(0.95); }

/* Bouton installation PWA */
.install-btn {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 999;
  background: var(--accent); color: var(--bg);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem; letter-spacing: 0.15em;
  padding: 10px 28px; border-radius: 100px; border: none;
  cursor: pointer; box-shadow: 0 0 30px rgba(232,255,71,0.5);
  animation: playPulse 2s ease-in-out infinite;
  display: none;
}

/* ── JEU ── */
.app { position:relative; z-index:1; height:100dvh; display:flex; flex-direction:column; align-items:center; padding:8px 12px 4px; max-width:480px; margin:0 auto; }
.header { width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; flex-shrink:0; }
.game-title { font-family:'Bebas Neue',sans-serif; font-size:1.9rem; letter-spacing:0.15em; color:var(--accent); text-shadow:0 0 30px rgba(232,255,71,0.4); line-height:1; }
.score-badge { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.score-label { font-family:'DM Mono',monospace; font-size:0.55rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; }
.score-val { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--accent3); letter-spacing:0.1em; line-height:1; }
.diff-badge { font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; padding:3px 8px; border-radius:100px; margin-left:8px; }
.diff-badge.easy   { background:rgba(72,219,251,0.12); color:var(--accent3); border:1px solid rgba(72,219,251,0.3); }
.diff-badge.normal { background:rgba(232,255,71,0.12); color:var(--accent);  border:1px solid rgba(232,255,71,0.3); }
.diff-badge.hard   { background:rgba(255,71,87,0.12);  color:var(--accent2); border:1px solid rgba(255,71,87,0.3); }
.category-pill { display:inline-flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--border); padding:4px 14px; border-radius:100px; font-family:'DM Mono',monospace; font-size:1.05rem; color:var(--text); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; flex-shrink:0; }
.cat-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
.gallows-wrap { width:100%; display:flex; justify-content:center; margin-bottom:4px; flex-shrink:0; }
#gallows-svg { width:180px; height:130px; }
.attempts-bar { display:flex; gap:6px; margin-bottom:6px; flex-shrink:0; }
.attempt-dot { width:8px; height:8px; border-radius:50%; background:var(--accent2); box-shadow:0 0 8px var(--accent2); transition:all 0.3s; }
.attempt-dot.used { background:rgba(255,255,255,0.1); box-shadow:none; }
.word-display { display:flex; gap:8px; flex-wrap:nowrap; justify-content:center; align-items:center; width:100%; margin-bottom:6px; min-height:44px; flex-shrink:0; }
.word-display.medium { gap:5px; }
.word-display.long   { gap:3px; }
.letter-slot { display:flex; flex-direction:column; align-items:center; gap:3px; }
.letter-char { font-family:'DM Serif Display',serif; font-size:1.7rem; line-height:1; min-width:26px; text-align:center; color:var(--text); transition:all 0.3s; transform-origin:bottom; }
.word-display.medium .letter-char { font-size:1.35rem; min-width:21px; }
.word-display.long   .letter-char { font-size:1.05rem; min-width:16px; }
.letter-char.revealed { animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); color:var(--accent); }
.letter-char.wrong    { color:var(--accent2); animation:shake 0.4s ease; }
@keyframes popIn { 0%{transform:scale(0) rotateX(90deg);opacity:0} 100%{transform:scale(1) rotateX(0);opacity:1} }
@keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.letter-line { height:2px; background:rgba(255,255,255,0.2); border-radius:1px; width:26px; }
.word-display.medium .letter-line { width:21px; }
.word-display.long   .letter-line { width:16px; }
.letter-line.revealed { background:var(--accent); box-shadow:0 0 6px var(--accent); }
.hint-row { font-family:'DM Mono',monospace; font-size:1.05rem; color:var(--accent3); letter-spacing:0.06em; margin-bottom:6px; text-align:center; min-height:20px; font-weight:500; flex-shrink:0; padding:0 4px; }
.keyboard { width:100%; display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.key-row { display:flex; justify-content:center; gap:4px; }
.key { background:var(--card); border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:0.8rem; font-weight:500; width:34px; height:40px; border-radius:6px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; -webkit-user-select:none; user-select:none; }
.key::after { content:''; position:absolute; inset:0; background:var(--accent); opacity:0; transition:opacity 0.1s; }
.key:active::after { opacity:0.15; }
.key:not([disabled]):hover { border-color:rgba(232,255,71,0.4); color:var(--accent); transform:translateY(-1px); }
.key.correct { background:rgba(232,255,71,0.12); border-color:var(--accent); color:var(--accent); cursor:default; }
.key.wrong   { background:rgba(255,71,87,0.08); border-color:rgba(255,71,87,0.3); color:var(--accent2); cursor:default; opacity:0.5; }
.game-audio-bar { display:flex; gap:10px; justify-content:flex-end; width:100%; padding:6px 0 2px; flex-shrink:0; }
.game-audio-bar button { background:rgba(232,255,71,0.08); border:1px solid rgba(232,255,71,0.35); color:#e8ff47; font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.1em; padding:7px 12px; border-radius:100px; cursor:pointer; transition:all 0.2s; }
.game-audio-bar button:active { transform:scale(0.95); }
.back-menu-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; padding:6px 12px; border-radius:100px; cursor:pointer; transition:all 0.2s; -webkit-user-select:none; user-select:none; }
.back-menu-btn:active { transform:scale(0.95); background:rgba(255,255,255,0.1); }

/* ── OVERLAY ── */
.motmagique-gif { width:220px; max-width:80vw; border-radius:8px; animation:bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
.motmagique-gif.hidden { display:none; }
.overlay { position:fixed; inset:0; background:rgba(15,12,26,0.93); backdrop-filter:blur(12px); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:50; gap:20px; padding:32px; text-align:center; transition:opacity 0.4s; }
.overlay.hidden { opacity:0; pointer-events:none; }
.overlay-emoji { font-size:4rem; animation:bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bounceIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
.overlay-title { font-family:'Bebas Neue',sans-serif; font-size:3rem; letter-spacing:0.1em; line-height:1; }
.overlay-title.win  { color:var(--accent);  text-shadow:0 0 40px rgba(232,255,71,0.5); }
.overlay-title.lose { color:var(--accent2); text-shadow:0 0 40px rgba(255,71,87,0.5); }
.overlay-word { font-family:'DM Serif Display',serif; font-style:italic; font-size:1.4rem; color:var(--muted); }
.overlay-word span { color:var(--text); font-style:normal; }
.play-again-btn { background:var(--accent); color:var(--bg); border:none; padding:14px 40px; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.15em; cursor:pointer; border-radius:4px; transition:all 0.2s; box-shadow:0 0 30px rgba(232,255,71,0.3); }
.play-again-btn:hover { transform:translateY(-2px); box-shadow:0 0 50px rgba(232,255,71,0.5); }
.menu-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:10px 30px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.15em; cursor:pointer; border-radius:4px; transition:all 0.2s; }
.menu-btn:hover { border-color:var(--muted); color:var(--text); }
</style>
</head>
<body>

<!-- ═══════════ ECRAN CODE ═══════════ -->
<div id="code-screen">
  <div class="menu-bg"></div>
  <div class="code-logo">LE PENDU</div>
  <div class="code-subtitle">🔒 Accès privé — entrez votre code</div>
  <div class="code-input-wrap">
    <input class="code-input" id="code-input" type="number" maxlength="4" placeholder="••••" inputmode="numeric">
    <div class="code-error" id="code-error"></div>
    <button class="code-submit" onclick="validerCode()">ENTRER</button>
  </div>
</div>

<!-- ═══════════ MENU ═══════════ -->
<div id="menu-screen" class="hidden">
  <div class="menu-bg"></div>
  <div class="highscore-bar">🏆 High Score&nbsp;: <span id="hs-display">0</span></div>
  <div class="menu-logo">LE PENDU</div>
  <div class="menu-gallows">
    <svg width="120" height="90" viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="155" x2="200" y2="155" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="155" x2="60"  y2="10"  stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="10"  x2="140" y2="10"  stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
      <line x1="140" y1="10" x2="140" y2="30"  stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
      <circle cx="140" cy="44" r="14" stroke="rgba(232,255,71,0.4)" stroke-width="2.5"/>
      <line x1="140" y1="58"  x2="140" y2="100" stroke="rgba(232,255,71,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="140" y1="70"  x2="118" y2="90"  stroke="rgba(232,255,71,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="140" y1="70"  x2="162" y2="90"  stroke="rgba(232,255,71,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="140" y1="100" x2="118" y2="130" stroke="rgba(232,255,71,0.4)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="140" y1="100" x2="162" y2="130" stroke="rgba(232,255,71,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="menu-section-title">Difficulté</div>
  <div class="diff-group">
    <button class="diff-btn active-easy" id="btn-easy"   onclick="setDiff('easy')">Facile</button>
    <button class="diff-btn"             id="btn-normal" onclick="setDiff('normal')">Normal</button>
    <button class="diff-btn"             id="btn-hard"   onclick="setDiff('hard')">Difficile</button>
  </div>
  <div class="menu-section-title">Options</div>
  <div class="toggle-row" onclick="toggleHints()">
    <span class="toggle-label">💡 Indices</span>
    <div class="toggle-switch on" id="hint-switch"></div>
  </div>
  <button class="play-btn" onclick="startGame()">▶ JOUER</button>
  <button class="menu-sound-btn" id="menu-sound-btn" onclick="toggleSound()">🔊 Son ON</button>
</div>

<!-- ═══════════ JEU ═══════════ -->
<div class="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="game-title">LE PENDU</div>
      <span class="diff-badge easy" id="diff-badge">Facile</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="back-menu-btn" onclick="goToMenu()">☰ Menu</button>
      <div class="score-badge">
        <span class="score-label">Score</span>
        <span class="score-val" id="score">0</span>
      </div>
    </div>
  </div>
  <div class="category-pill">
    <div class="cat-dot"></div>
    <span id="category-label">—</span>
  </div>
  <div class="gallows-wrap">
    <svg id="gallows-svg" viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="155" x2="200" y2="155" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="155" x2="60"  y2="10"  stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="10"  x2="140" y2="10"  stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
      <line x1="140" y1="10" x2="140" y2="30"  stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
      <circle id="p-head" cx="140" cy="44" r="14" stroke="#ff4757" stroke-width="2.5" opacity="0" style="transition:opacity 0.4s"/>
      <line id="p-body" x1="140" y1="58"  x2="140" y2="100" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.4s"/>
      <line id="p-larm" x1="140" y1="70"  x2="118" y2="90"  stroke="#ff4757" stroke-width="2.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.4s"/>

let currentDiff  = 'easy';
let hintsEnabled = true;

function setDiff(d) {
  currentDiff = d;
  ['easy','normal','hard'].forEach(function(x) {
    document.getElementById('btn-'+x).className = 'diff-btn' + (x===d ? ' active-'+x : '');
  });
}

function toggleHints() {
  hintsEnabled = !hintsEnabled;
  document.getElementById('hint-switch').className = 'toggle-switch' + (hintsEnabled ? ' on' : '');
}

function startGame() {
  const badge = document.getElementById('diff-badge');
  const labels = { easy:'Facile', normal:'Normal', hard:'Difficile' };
  badge.textContent = labels[currentDiff];
  badge.className   = 'diff-badge ' + currentDiff;
  if      (currentDiff === 'easy')   pickWord = makeQueue(WORDS_EASY);
  else if (currentDiff === 'normal') pickWord = makeQueue(WORDS_NORMAL);
  else                               pickWord = makeQueue(WORDS_HARD);
  document.getElementById('menu-screen').classList.add('hidden');
  switchToGameMusic();
  S = 0; winsCount = 0;
  document.getElementById('score').textContent = '0';
  newGame();
}

function goToMenu() {
  stopMotSfx();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  var hs = parseInt(localStorage.getItem('pendu-hs') || '0');
  document.getElementById('hs-display').textContent = hs;
  switchToMenuMusic();
}

// ═══════════════════════════════════════════════════════
//  FILES MÉLANGÉES
// ═══════════════════════════════════════════════════════
function shuffle(a) {
  const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b;
}
function makeQueue(arr) {
  let q=[]; return function(){ if(!q.length) q=shuffle(arr); return q.shift(); };
}
let pickWord = makeQueue(WORDS_EASY);

// ═══════════════════════════════════════════════════════
//  ÉTAT DU JEU
// ═══════════════════════════════════════════════════════
let W, H, C, G, E, O;
let S = 0, winsCount = 0;
const ROWS  = [['A','Z','E','R','T','Y','U','I','O','P'],['Q','S','D','F','G','H','J','K','L','M'],['W','X','C','V','B','N']];
const PARTS = ['p-head','p-body','p-larm','p-rarm','p-lleg','p-rleg'];
const MAX   = 6;

// ═══════════════════════════════════════════════════════
//  LOGIQUE DU JEU
// ═══════════════════════════════════════════════════════
function newGame() {
  stopMotSfx();
  const e = pickWord();
  W=e.word.toUpperCase(); H=e.hint; C=e.cat;
  G=new Set(); E=0; O=false;
  document.getElementById('overlay').classList.add('hidden');
  render();
}

function guess(l) {
  if (O || G.has(l)) return;
  G.add(l);
  if (!W.includes(l)) E++;
  if ([...W].every(x => G.has(x))) {
    S += Math.max(10, 50-E*8);
    var hs = parseInt(localStorage.getItem('pendu-hs') || '0');
    if (S > hs) localStorage.setItem('pendu-hs', S);
    O=true; winsCount++;
    setTimeout(function(){ end(true); }, 400);
  } else if (E >= MAX) {
    O=true;
    setTimeout(function(){ end(false); }, 400);
  }
  render();
}

function stopMotSfx() {
  if (window.motSfx) { window.motSfx.pause(); window.motSfx.currentTime=0; window.motSfx=null; }
}

function end(won) {
  document.getElementById('overlay-emoji').textContent = won ? '🎉' : '💀';
  const t = document.getElementById('overlay-title');
  t.textContent = won ? 'BRAVO !' : 'PERDU !';
  t.className = 'overlay-title ' + (won ? 'win' : 'lose');
  document.getElementById('overlay-word').innerHTML = won
    ? 'Score\u00A0: <span>+' + Math.max(10,50-E*8) + ' pts</span>'
    : 'Le mot\u00A0était\u00A0: <span>' + W + '</span>';

  const gif = document.getElementById('motmagique-gif');
  gif.classList.add('hidden');
  gif.src = '';

  if (!won) {
    if (window.soundOn && window.player) window.player.pause();
    gif.src = 'Motmagique.gif';
    gif.classList.remove('hidden');
    try {
      if (window.motSfx) { window.motSfx.pause(); window.motSfx.currentTime = 0; }
      window.motSfx = new Audio('Motmagique.mp3');
      window.motSfx.loop = true;
      window.motSfx.play().catch(function(){});
    } catch(e) {}
  }

  document.getElementById('overlay').classList.remove('hidden');
}

function render() {
  document.getElementById('category-label').textContent = C;
  document.getElementById('score').textContent = S;
  document.getElementById('hint-row').textContent = (hintsEnabled && E>=2) ? '💡 '+H : '';
  PARTS.forEach(function(id,i){ document.getElementById(id).style.opacity = E>i?'1':'0'; });
  const bar = document.getElementById('attempts-bar');
  bar.innerHTML='';
  for(let i=0;i<MAX;i++){const d=document.createElement('div');d.className='attempt-dot'+(i<E?' used':'');bar.appendChild(d);}
  const wd = document.getElementById('word-display');
  wd.innerHTML='';
  wd.className='word-display'+(W.length>=9?' long':W.length>=7?' medium':'');
  for(const l of W){
    const s=document.createElement('div');s.className='letter-slot';
    const ch=document.createElement('div');ch.className='letter-char';
    if(G.has(l)){ch.textContent=l;ch.classList.add('revealed');}
    else if(O){ch.textContent=l;ch.classList.add('wrong');}
    else{ch.textContent='\u00A0';}
    const ln=document.createElement('div');ln.className='letter-line'+(G.has(l)?' revealed':'');
    s.appendChild(ch);s.appendChild(ln);wd.appendChild(s);
  }
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  for(const row of ROWS){
    const r=document.createElement('div');r.className='key-row';
    for(const l of row){
      const b=document.createElement('button');b.className='key';b.textContent=l;
      if(G.has(l)){b.classList.add(W.includes(l)?'correct':'wrong');b.disabled=true;}
      else if(O){b.disabled=true;}
      else{b.addEventListener('click',function(){guess(l);});}
      r.appendChild(b);
    }
    kb.appendChild(r);
  }
}

document.getElementById('play-again-btn').addEventListener('click', newGame);
document.addEventListener('keydown', function(e){ const l=e.key.toUpperCase(); if(/^[A-Z]$/.test(l)) guess(l); });

//  AUDIO
// ═══════════════════════════════════════════════════════
(function() {
  const menuTrack  = 'menu.mp3';
  const gameTracks = ['01.mp3','02.mp3','03.mp3'];
  let idx=0, mode='menu';
  window.soundOn = false;
  window.player  = new Audio();
  var soundOn = window.soundOn;
  var player  = window.player;
  player.preload = 'none';

  player.addEventListener('ended', function() {
    if (!soundOn) return;
    if (mode==='game') idx=(idx+1)%gameTracks.length;
    startPlay();
  });

  function startPlay() {
    var src = (mode==='menu') ? menuTrack : gameTracks[idx];
    player.src=src; player.load(); player.play().catch(function(){});
  }

  function updateBtns() {
    var label = soundOn ? '🔊 Son ON' : '🔇 Son OFF';
    var mb=document.getElementById('menu-sound-btn');
    var gb=document.getElementById('game-sound-btn');
    if(mb) mb.textContent=label;
    if(gb) gb.textContent=label;
  }

  window.toggleSound = function() {
    soundOn=!soundOn; window.soundOn=soundOn;
    if(soundOn){ startPlay(); } else { player.pause(); player.src=''; }
    updateBtns();
  };

  window.switchToGameMusic = function() {
    mode='game'; idx=0; player.pause(); player.src='';
    if(soundOn) startPlay();
  };

  window.switchToMenuMusic = function() {
    mode='menu'; player.pause(); player.src='';
    if(soundOn) startPlay();
  };

  window.nextTrack = function() {
    if(mode!=='game') return;
    idx=(idx+1)%gameTracks.length; player.pause(); player.src='';
    if(soundOn) startPlay();
  };

  updateBtns();
})();

</script>

<script>
// ═══════════════════════════════════════════════════════
//  VERIFICATION CODE D'ACCES
// ═══════════════════════════════════════════════════════
(function() {
  // Si déjà validé dans cette session, passer directement au menu
  if (localStorage.getItem('pendu-access') === 'ok') {
    document.getElementById('code-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
  }
})();

window.validerCode = function() {
  var input = document.getElementById('code-input');
  var errEl = document.getElementById('code-error');
  var code  = input.value.trim();

  // Vérifier que codes.js est chargé
  if (typeof CODES_VALIDES === 'undefined') {
    errEl.textContent = 'Erreur de chargement, réessayez.';
    return;
  }

  if (CODES_VALIDES.indexOf(code) !== -1) {
    // Code valide
    localStorage.setItem('pendu-access', 'ok');
    document.getElementById('code-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
    // Afficher le high score
    var hs = parseInt(localStorage.getItem('pendu-hs') || '0');
    document.getElementById('hs-display').textContent = hs;
  } else {
    // Code invalide
    errEl.textContent = '❌ Code incorrect';
    input.classList.add('error');
    input.value = '';
    setTimeout(function() {
      input.classList.remove('error');
      errEl.textContent = '';
    }, 1500);
  }
};

// Valider avec la touche Entrée
document.getElementById('code-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') validerCode();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(function() {
    navigator.serviceWorker.ready.then(function(reg) {
      reg.active.postMessage('getVersion');
    });
  }).catch(function(){});

  navigator.serviceWorker.addEventListener('message', function(e) {
    var version = e.data.replace('pendu-', '');
    var el = document.getElementById('version-display');
    if (el) el.textContent = version;
  });
}

// ── Installation PWA ──
var deferredPrompt = null;
var installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.addEventListener('click', function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() {
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });
});

window.addEventListener('appinstalled', function() {
  installBtn.style.display = 'none';
  deferredPrompt = null;
});
</script>
<button class="install-btn" id="install-btn">📲 Installer le jeu</button>
<div class="signature">Développé par Bernard V — <span id="version-display" style="color:var(--accent3)">v1.1.5</span></div>
</body>
</html>
